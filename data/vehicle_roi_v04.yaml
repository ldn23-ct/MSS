schema:
  name: vehicle_roi_model
  version: v031_trunk_side_yaml_1
  format: yaml
metadata:
  model_name: vehicle_side_backscatter_roi
  model_version: V3.3_four_independent_seats
  source_report: vehicle_roi_modeling_v031_trunk_side_report.md
  source_sha256: b902ba3cd8e38a5fbb19b4d85a1fa8c496ed8b3c3afac8b11d3342f03deeec69
  generated_at_utc: '2026-05-28'
  scope: vehicle ROI geometry and Geant4 material definitions for side-entry backscatter; source/detector/collimator/old PMMA
    phantom are out of scope
  revision_note: 'Split two row-level seat blocks into four independent seats: front_near, front_far, rear_near, rear_far;
    all seats face -x and seat-back thickness is along x.'
units:
  length: mm
  density: g/cm3
  mass_fraction: fraction
  size_semantics: full_length_not_half_length
coordinate_system:
  x: vehicle length direction / lateral scan direction; +x points to vehicle rear, -x points to vehicle front
  y: vehicle height direction; +y upward
  z: side-entry depth direction; z=0 is near-side outer surface, +z points into vehicle and toward far-side body
  origin:
    definition: projection of B-pillar centerline on near-side outer body surface
    position_mm:
    - 0.0
    - 0.0
    - 0.0
roi:
  name: VehicleROI
  bounds_mm:
    x:
    - -900.0
    - 1300.0
    y:
    - 0.0
    - 1250.0
    z:
    - 0.0
    - 1450.0
  center_mm:
  - 200.0
  - 625.0
  - 725.0
  size_mm:
  - 2200.0
  - 1250.0
  - 1450.0
  material: G4_AIR
  region_id: vehicle_background_air
geant4_placement_rules:
  solid: G4Box for each listed component
  box_half_length_mm: size_mm * 0.5
  global_center_semantics: component center is expressed in VehicleROI coordinate system
  placement_center_in_host_mm: component_center_mm - host_center_mm
  touching_surfaces: allowed in conceptual model
  optional_engineering_gap_mm: 0.01
materials:
  G4_AIR:
    type: NIST
    built_in: true
    semantic: air
  G4_Fe:
    type: NIST
    built_in: true
    semantic: ordinary/high-strength steel proxy
  G4_Al:
    type: NIST
    built_in: true
    semantic: optional aluminum body-panel substitute
    default: false
  G4_GLASS_PLATE:
    type: NIST
    built_in: true
    semantic: side window glass slab
  G4_POLYPROPYLENE:
    type: NIST
    built_in: true
    semantic: PP-like door trim/interior plastic
  G4_POLYETHYLENE:
    type: NIST
    built_in: true
    semantic: default low-Z abnormal target proxy
  G4_W:
    type: NIST
    built_in: true
    semantic: optional high-Z abnormal target proxy
  Vehicle_PU_Foam:
    type: custom
    built_in: false
    density_g_cm3: 0.055
    elements_by_mass_fraction:
      C: 0.6
      H: 0.08
      O: 0.28
      N: 0.04
    semantic: low-density polyurethane seat foam proxy
model_modes:
  normal:
    rule: all insert components use their normal material and normal region_id
  abnormal:
    selected_target_component: null
    rule: only selected_target_component uses abnormal material and abnormal region_id; all other inserts remain normal
    default_abnormal_material: G4_POLYETHYLENE
    alternative_abnormal_materials:
    - G4_Fe
    - G4_W
    target_region_id: target
    recommended_single_target_components:
    - near_front_door_insert
    - near_rear_door_insert
    - far_front_door_insert
    - far_rear_door_insert
    - front_near_seat_insert
    - front_far_seat_insert
    - rear_near_seat_insert
    - rear_far_seat_insert
    - cabin_air_package_insert
    - rear_trunk_package_insert
regions:
  detailed_region_ids:
  - vehicle_background_air
  - near_door_outer_metal
  - near_door_cavity_air
  - near_door_reinforcement
  - near_door_inner_metal
  - near_door_trim
  - far_door_trim
  - far_door_inner_metal
  - far_door_cavity_air
  - far_door_reinforcement
  - far_door_outer_metal
  - near_window_glass
  - far_window_glass
  - near_b_pillar_metal
  - near_c_pillar_metal
  - far_b_pillar_metal
  - far_c_pillar_metal
  - cabin_air
  - seat_foam
  - seat_frame_metal
  - rear_trunk_air
  - near_trunk_side_outer_metal
  - near_trunk_side_cavity_air
  - near_trunk_side_reinforcement
  - near_trunk_side_inner_metal
  - near_trunk_side_trim
  - far_trunk_side_trim
  - far_trunk_side_inner_metal
  - far_trunk_side_cavity_air
  - far_trunk_side_reinforcement
  - far_trunk_side_outer_metal
  - target
  - other
  - none
  merge_groups:
    background_air:
    - vehicle_background_air
    door_metal:
    - near_door_outer_metal
    - near_door_inner_metal
    - far_door_inner_metal
    - far_door_outer_metal
    door_cavity_air:
    - near_door_cavity_air
    - far_door_cavity_air
    door_reinforcement:
    - near_door_reinforcement
    - far_door_reinforcement
    door_trim:
    - near_door_trim
    - far_door_trim
    window_glass:
    - near_window_glass
    - far_window_glass
    pillar_metal:
    - near_b_pillar_metal
    - near_c_pillar_metal
    - far_b_pillar_metal
    - far_c_pillar_metal
    cabin_air:
    - cabin_air
    seat:
    - seat_foam
    - seat_frame_metal
    trunk_air:
    - rear_trunk_air
    target:
    - target
    other:
    - other
    none:
    - none
    trunk_side_metal:
    - near_trunk_side_outer_metal
    - near_trunk_side_inner_metal
    - far_trunk_side_inner_metal
    - far_trunk_side_outer_metal
    trunk_side_cavity_air:
    - near_trunk_side_cavity_air
    - far_trunk_side_cavity_air
    trunk_side_reinforcement:
    - near_trunk_side_reinforcement
    - far_trunk_side_reinforcement
    trunk_side_trim:
    - near_trunk_side_trim
    - far_trunk_side_trim
